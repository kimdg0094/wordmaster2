<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>영단어 501-1000 암기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--card-bg:#ffffff;--card-border:#dde3ec;
  --accent:#4f46e5;--accent2:#0284c7;
  --green:#16a34a;--red:#dc2626;--text:#1e293b;--muted:#64748b;
}
body{font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 60% 50% at 10% 10%,rgba(79,70,229,0.07) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 90% 90%,rgba(2,132,199,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
.start-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center}
.start-logo{font-size:72px;line-height:1;margin-bottom:6px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.start-title{font-size:28px;font-weight:700;color:var(--text);margin-bottom:6px}
.start-sub{font-size:15px;color:var(--muted);margin-bottom:36px}
.start-sub b{color:var(--accent)}
.info-box{background:#fff;border:1px solid var(--card-border);border-radius:20px;padding:24px 28px;margin-bottom:32px;text-align:left;width:100%;max-width:440px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.info-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:16px}
.info-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;font-size:14px;color:#334155;line-height:1.5}
.info-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.start-btn{background:var(--accent);border:none;border-radius:16px;padding:16px 52px;font-size:18px;font-weight:700;color:white;cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,0.3);transition:transform .15s,box-shadow .15s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,0.4)}
.main{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:0 16px 40px}
.header{width:100%;max-width:620px;padding:18px 4px 12px;display:flex;align-items:center;justify-content:space-between}
.stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:2px}
.stat-val{font-size:24px;font-weight:700}
.wrong-btn{border-radius:12px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid rgba(220,38,38,0.3);background:rgba(220,38,38,0.07);color:var(--red)}
.wrong-btn:hover{background:rgba(220,38,38,0.14)}
.wrong-btn.empty{border-color:var(--card-border);background:#f8fafc;color:var(--muted)}
.prog-wrap{width:100%;max-width:620px;margin-bottom:18px;padding:0 4px}
.prog-bg{background:#dde3ec;border-radius:99px;height:4px}
.prog-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-txt{font-size:11px;color:var(--muted);text-align:right;margin-top:5px}
.card-area{width:100%;max-width:580px;display:flex;flex-direction:column;align-items:center}
.badges{display:flex;gap:8px;margin-bottom:14px;min-height:28px;align-items:center}
.badge{border-radius:7px;padding:4px 12px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-pos{background:#ede9fe;border:1px solid #c4b5fd;color:#5b21b6}
.badge-hard{background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c}
.badge-new{background:#dcfce7;border:1px solid #86efac;color:#15803d}
.card-front{width:100%;min-height:280px;border-radius:24px;background:#fff;border:1px solid var(--card-border);display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;padding:40px 32px;box-shadow:0 4px 20px rgba(0,0,0,0.08);transition:box-shadow .2s,transform .15s}
.card-front:hover{box-shadow:0 8px 32px rgba(79,70,229,0.12);transform:translateY(-2px)}
.dir-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:16px;text-transform:uppercase}
.card-word{font-size:48px;font-weight:700;color:var(--text);text-align:center;letter-spacing:0;line-height:1.15}
.card-word.medium{font-size:36px}
.card-word.long{font-size:26px}
.card-hint{color:var(--muted);font-size:13px;margin-top:14px}
.card-hint kbd{background:#f1f5f9;border:1px solid #cbd5e1;border-radius:4px;padding:1px 6px;font-family:monospace;font-size:11px;margin:0 2px}
.card-back{width:100%;border-radius:24px;background:#fff;padding:30px 28px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:1px solid var(--card-border)}
.back-dir{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.back-word{font-size:28px;font-weight:700;color:#0f172a;margin-bottom:8px}
.back-meaning{display:inline-block;background:var(--accent);color:white;border-radius:10px;padding:8px 18px;font-size:18px;font-weight:700;margin-bottom:20px}
.syn-ant{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sa-box{border-radius:12px;padding:12px 16px}
.sa-box.syn{background:#f0fdf4;border:1px solid #bbf7d0}
.sa-box.ant{background:#fff1f2;border:1px solid #fecdd3}
.sa-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.sa-lbl.syn{color:#16a34a}
.sa-lbl.ant{color:#dc2626}
.sa-val{font-size:15px;font-weight:700}
.sa-val.syn{color:#15803d}
.sa-val.ant{color:#b91c1c}
.ex-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px}
.ex-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#475569;margin-bottom:6px}
.ex-en{font-size:14px;font-style:italic;color:#1e293b;font-weight:600;margin-bottom:4px;line-height:1.5}
.ex-kr{font-size:13px;color:#64748b;line-height:1.5}
.flip-btn{margin-top:18px;background:var(--accent);border:none;border-radius:14px;padding:14px 44px;font-size:16px;font-weight:700;color:white;cursor:pointer;box-shadow:0 4px 14px rgba(79,70,229,0.3);transition:transform .15s,box-shadow .15s}
.flip-btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(79,70,229,0.4)}
.btn-row{display:flex;gap:14px;margin-top:16px;width:100%}
.ans-btn{flex:1;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s;border:2px solid}
.btn-no{background:#fff1f2;border-color:#fca5a5;color:#dc2626}
.btn-no:hover{background:#fee2e2;transform:scale(1.02)}
.btn-yes{background:#f0fdf4;border-color:#86efac;color:#16a34a}
.btn-yes:hover{background:#dcfce7;transform:scale(1.02)}
.kbd-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}
.kbd-hint span{background:#f1f5f9;border:1px solid #cbd5e1;border-radius:4px;padding:1px 7px;font-family:monospace;margin:0 2px;color:#475569}
.panel{position:fixed;right:0;top:0;bottom:0;width:310px;background:#fff;border-left:1px solid var(--card-border);box-shadow:-4px 0 20px rgba(0,0,0,0.08);padding:24px 18px;overflow-y:auto;z-index:100;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.panel.open{transform:translateX(0)}
.panel-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.panel-title{font-size:16px;font-weight:700;color:var(--text)}
.panel-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:24px;line-height:1}
.w-item{background:#fff8f8;border:1px solid #fecdd3;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.w-word{font-weight:700;font-size:14px;color:var(--text)}
.w-meaning{font-size:12px;color:var(--muted);margin-top:2px}
.w-weight{font-size:11px;color:var(--red);font-weight:700;margin-top:4px}
.empty-msg{color:var(--muted);font-size:14px;text-align:center;margin-top:40px;line-height:1.8}
</style>
</head>

];

const CARDS=[];
WORDS.forEach(w=>{CARDS.push({cid:`${w.id}_en`,dir:'en',word:w});CARDS.push({cid:`${w.id}_kr`,dir:'kr',word:w});});

let weights={};
CARDS.forEach(c=>weights[c.cid]=1);
let current=null,flipped=false,showPanel=false,started=false;
let stats={total:0,correct:0,wrong:0};
let wrongCids=new Set(),seenCids=new Set();

function pick(){const total=CARDS.reduce((s,c)=>s+(weights[c.cid]||1),0);let r=Math.random()*total;for(const c of CARDS){r-=(weights[c.cid]||1);if(r<=0)return c;}return CARDS[CARDS.length-1];}
function goNext(){current=pick();flipped=false;render();}
function doFlip(){if(flipped||!current)return;flipped=true;seenCids.add(current.cid);render();}
function answer(knew){if(!current)return;if(knew){weights[current.cid]=Math.max(1,(weights[current.cid]||1)-1);}else{weights[current.cid]=Math.min(8,(weights[current.cid]||1)+3);wrongCids.add(current.cid);}stats.total++;if(knew)stats.correct++;else stats.wrong++;goNext();}
function togglePanel(){showPanel=!showPanel;render();}

function render(){
  const app=document.getElementById('app');
  if(!started){
    app.innerHTML=`<div class="start-wrap">
  <div class="start-logo">📗</div>
  <h1 class="start-title">영단어 501~1000 암기</h1>
  <p class="start-sub">총 <b>1000장</b> (500단어 × 영→한 + 한→영) · 간격 반복</p>
  <div class="info-box">
    <div class="info-title">사용 방법</div>
    <div class="info-row"><span class="info-icon">🇺🇸</span><span><b>영→한</b> : 영어 단어 보고 한국어 뜻 맞추기</span></div>
    <div class="info-row"><span class="info-icon">🇰🇷</span><span><b>한→영</b> : 한국어 뜻 보고 영어 단어 맞추기</span></div>
    <div class="info-row"><span class="info-icon">🃏</span><span>카드 클릭 / <b>Space</b> → 정답 확인</span></div>
    <div class="info-row"><span class="info-icon">❌</span><span><b>모르겠어요</b> / ← 키 → 가중치 3배 증가</span></div>
    <div class="info-row"><span class="info-icon">✅</span><span><b>알아요</b> / → 키 → 가중치 감소</span></div>
  </div>
  <button class="start-btn" onclick="startApp()">학습 시작 🚀</button>
</div>`;return;}

  const w=current?current.word:null;
  const dir=current?current.dir:null;
  const acc=stats.total>0?Math.round(stats.correct/stats.total*100):0;
  const isHard=current&&(weights[current.cid]||1)>=4;
  const isNew=current&&!seenCids.has(current.cid);
  const frontText=dir==='en'?w.word:w.meaning;
  const frontLabel=dir==='en'?'🇺🇸 영어 → 한국어':'🇰🇷 한국어 → 영어';
  const fLen=frontText?frontText.length:0;
  const wClass=fLen>22?"long":fLen>14?"medium":"";
  const wrongCards=CARDS.filter(c=>wrongCids.has(c.cid));
  const progPct=Math.round(seenCids.size/CARDS.length*100);

  let cardHtml='';
  if(!flipped){
    cardHtml=`<div class="card-front" onclick="doFlip()">
  <div class="dir-label">${frontLabel}</div>
  <div class="card-word ${wClass}">${frontText||''}</div>
  <div class="card-hint">👆 클릭 또는 <kbd>Space</kbd> 로 정답 확인</div>
</div>
<button class="flip-btn" onclick="doFlip()">정답 확인하기 👁</button>
<div class="kbd-hint"><span>Space</span> 뒤집기</div>`;
  }else{
    cardHtml=`<div class="card-back">
  <div class="back-dir">${dir==='en'?'🇺🇸 영어 → 한국어':'🇰🇷 한국어 → 영어'}</div>
  <div class="back-word">${w.word}</div>
  <div class="back-meaning">${w.meaning}</div>
  <div class="syn-ant">
    <div class="sa-box syn"><div class="sa-lbl syn">유의어 (Synonym)</div><div class="sa-val syn">${w.syn}</div></div>
    <div class="sa-box ant"><div class="sa-lbl ant">반의어 (Antonym)</div><div class="sa-val ant">${w.ant}</div></div>
  </div>
  <div class="ex-box">
    <div class="ex-lbl">📝 예문</div>
    <div class="ex-en">"${w.ex}"</div>
    <div class="ex-kr">${w.exKr}</div>
  </div>
</div>
<div class="btn-row">
  <button class="ans-btn btn-no" onclick="answer(false)">❌ 모르겠어요</button>
  <button class="ans-btn btn-yes" onclick="answer(true)">✅ 알아요</button>
</div>
<div class="kbd-hint"><span>←</span> 모르겠어요 &nbsp;|&nbsp; <span>→</span> 알아요</div>`;}

  app.innerHTML=`<div class="main">
  <div class="header">
    <div class="stats">
      <div class="stat"><div class="stat-lbl">총</div><div class="stat-val" style="color:#475569">${stats.total}</div></div>
      <div class="stat"><div class="stat-lbl">정답</div><div class="stat-val" style="color:#16a34a">${stats.correct}</div></div>
      <div class="stat"><div class="stat-lbl">오답</div><div class="stat-val" style="color:#dc2626">${stats.wrong}</div></div>
      <div class="stat"><div class="stat-lbl">정확도</div><div class="stat-val" style="color:#0284c7">${acc}%</div></div>
    </div>
    <button class="wrong-btn ${wrongCids.size===0?'empty':''}" onclick="togglePanel()">❌ 오답 ${wrongCids.size}개</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-bg"><div class="prog-fill" style="width:${progPct}%"></div></div>
    <div class="prog-txt">${seenCids.size} / ${CARDS.length}장 확인 (${progPct}%)</div>
  </div>
  <div class="card-area">
    <div class="badges">
      ${current?`<span class="badge badge-pos">${w.pos}</span>`:''}
      ${isHard?`<span class="badge badge-hard">🔥 집중 ×${weights[current.cid]}</span>`:''}
      ${isNew&&!flipped?`<span class="badge badge-new">✨ NEW</span>`:''}
    </div>
    ${cardHtml}
  </div>
</div>
<div class="panel ${showPanel?'open':''}">
  <div class="panel-hdr">
    <div class="panel-title">❌ 오답 카드 (${wrongCards.length})</div>
    <button class="panel-close" onclick="togglePanel()">×</button>
  </div>
  ${wrongCards.length===0?`<div class="empty-msg">아직 틀린 카드가 없어요! 👏<br><br>계속 열심히 해보세요!</div>`:wrongCards.map(c=>`<div class="w-item"><div class="w-word">${c.dir==='en'?'🇺🇸':' 🇰🇷'} ${c.dir==='en'?c.word.word:c.word.meaning}</div><div class="w-meaning">${c.dir==='en'?c.word.meaning:c.word.word}</div><div class="w-weight">가중치 ×${weights[c.cid]}</div></div>`).join('')}
</div>`;}

window.startApp=function(){started=true;goNext();}
window.doFlip=doFlip;
window.answer=answer;
window.togglePanel=togglePanel;
document.addEventListener('keydown',e=>{if(!started)return;if(e.key===' '&&!flipped){e.preventDefault();doFlip();}if(e.key==='ArrowRight'&&flipped)answer(true);if(e.key==='ArrowLeft'&&flipped)answer(false);});
render();
</script>
</body>
</html>
